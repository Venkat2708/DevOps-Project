version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: hospitaldb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - hospital-network

  redis:
    image: redis:7
    container_name: redis
    restart: always

    ports:
      - "6379:6379"

    networks:
      - hospital-network

  auth-service:
    build:
      context: ./auth-service

    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb
      REDIS_HOST: redis

    networks:
      - hospital-network

  patient-service:
    build:
      context: ./patient-service

    ports:
      - "5001:5001"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb

    networks:
      - hospital-network

  doctor-service:
    build:
      context: ./doctor-service

    ports:
      - "5002:5002"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb

    networks:
      - hospital-network

  appointment-service:
    build:
      context: ./appointment-service

    ports:
      - "5003:5003"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb

    networks:
      - hospital-network

  billing-service:
    build:
      context: ./billing-service

    ports:
      - "5004:5004"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb

    networks:
      - hospital-network

  dashboard-service:
    build:
      context: ./dashboard-service

    ports:
      - "5005:5005"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/hospitaldb

    networks:
      - hospital-network

  api-gateway:
    build:
      context: ./api-gateway

    ports:
      - "80:80"

    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - billing-service
      - dashboard-service

    networks:
      - hospital-network

  frontend:
    build:
      context: ./frontend

    ports:
      - "8080:80"

    depends_on:
      - api-gateway

    networks:
      - hospital-network

volumes:
  postgres_data:

networks:
  hospital-network:
    driver: overlay
